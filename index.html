<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Para Ti</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #fff3b0, #ffe27a, #ffd859);
        font-family: 'Segoe UI', sans-serif;
        overflow: hidden;
    }

    h1, p {
        text-align: center;
        color: #5a3f00;
        text-shadow: 1px 1px 2px #fff7d6;
    }

    .container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90%;
        max-width: 600px;
        background: rgba(255, 255, 255, 0.7);
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 0 15px rgba(0,0,0,0.15);
        backdrop-filter: blur(6px);
        animation: pop 1.3s ease;
    }

    @keyframes pop {
        0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
        100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

    /* Flores animadas */
    .flower {
        position: absolute;
        width: 40px;
        height: 40px;
        background-image: url('https://i.imgur.com/O4bV2Wd.png'); /* Flor amarilla PNG */
        background-size: cover;
        animation: fall linear infinite;
        opacity: 0.9;
    }

    @keyframes fall {
        0% { transform: translateY(-100px) rotate(0deg); }
        100% { transform: translateY(110vh) rotate(360deg); }
    }
</style>
</head>
<body>

<div class="container">
    <h1>Flores Amarillas Para Ti</h1>
    <p>Aunque no haya sido nuestro mejor día, quiero que sepas que pienso en ti,<br>
    que no me gusta que seas espectadora y que te amo mucho.</p>
</div>

<script>
    function createFlower() {
        const flower = document.createElement('div');
        flower.classList.add('flower');
        flower.style.left = Math.random() * window.innerWidth + 'px';
        flower.style.animationDuration = (4 + Math.random() * 6) + 's';
        flower.style.opacity = 0.7 + Math.random() * 0.3;
        document.body.appendChild(flower);

        setTimeout(() => {
            flower.remove();
        }, 10000);
    }

    setInterval(createFlower, 300);
</script>

</body>
</html>
